<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Final Revision — Study Guide</title>
    <meta name="description" content="Comprehensive AI Final Revision study guide covering K-Means, KNN, SVM, Neural Networks, Genetic Algorithms, Q-Learning, and more.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
    
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="20" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="80 40" class="loading-circle"/>
                    <defs>
                        <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48">
                            <stop offset="0%" stop-color="#818cf8"/>
                            <stop offset="100%" stop-color="#c084fc"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <p class="loading-text">Loading Study Materials…</p>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div>
                    <h1 class="logo-title">AI Revision</h1>
                    <p class="logo-subtitle">Final Exam Guide</p>
                </div>
            </div>
            <button id="sidebar-close" class="sidebar-close" aria-label="Close sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        
        <div class="sidebar-search">
            <div class="search-box">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search topics..." autocomplete="off">
            </div>
        </div>

        <nav id="sidebar-nav" class="sidebar-nav">
            <!-- Populated by JS -->
        </nav>

        <div class="sidebar-footer">
            <div class="theme-toggle-group">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <!-- Sidebar overlay for mobile -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <button id="menu-toggle" class="menu-toggle" aria-label="Open sidebar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M3 12h18M3 6h18M3 18h18"/>
                </svg>
            </button>
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-home">AI Revision</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
                <span class="breadcrumb-current" id="breadcrumb-current">Welcome</span>
            </div>
            <div class="top-bar-actions">
                <button id="toc-toggle" class="toc-toggle" aria-label="Table of contents" title="Table of Contents">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Welcome Screen -->
        <div id="welcome-screen" class="welcome-screen">
            <div class="welcome-hero">
                <div class="welcome-badge">📚 Study Smart, Not Hard</div>
                <h2 class="welcome-title">AI Final Revision</h2>
                <p class="welcome-desc">Your comprehensive study guide for the AI final exam. Select a topic from the sidebar to begin reviewing.</p>
            </div>
            <div class="topic-grid" id="topic-grid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Article Content -->
        <article id="article-content" class="article-content" style="display:none;">
            <div class="article-body" id="article-body">
                <!-- Rendered markdown goes here -->
            </div>
            <div class="article-nav" id="article-nav">
                <!-- Previous / Next buttons -->
            </div>
        </article>

        <!-- Table of Contents Panel -->
        <aside id="toc-panel" class="toc-panel">
            <div class="toc-header">
                <h3>On This Page</h3>
                <button id="toc-close" class="toc-close" aria-label="Close TOC">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <nav id="toc-nav" class="toc-nav">
                <!-- Populated by JS -->
            </nav>
        </aside>

        <!-- Scroll to top -->
        <button id="scroll-top" class="scroll-top" aria-label="Scroll to top">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
        </button>
    </main>

    <script src="app.js"></script>
</body>
</html>
